<svg width="850" height="400" viewBox="0 0 850 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    PROJECT 0631: CORE NEURAL INTERFACE
    AUTHOR: DORIAN (MANAGER)
    NODES: SUSAN (V2030), ALEX (AGENT)
    FIDELITY: HIGH
  -->
  <style>
    @keyframes rotate-clockwise { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes rotate-counter { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes pulse-core { 
      0%, 100% { opacity: 0.4; transform: scale(1); filter: blur(1px); } 
      50% { opacity: 1; transform: scale(1.1); filter: blur(0px); } 
    }
    @keyframes scan-line {
      0% { transform: translateY(-150px); opacity: 0; }
      20% { opacity: 0.4; }
      80% { opacity: 0.4; }
      100% { transform: translateY(150px); opacity: 0; }
    }
    @keyframes data-flow {
      to { stroke-dashoffset: -100; }
    }
    .ring-outer { transform-origin: center; animation: rotate-clockwise 40s linear infinite; }
    .ring-inner { transform-origin: center; animation: rotate-counter 25s linear infinite; }
    .core-sync { transform-origin: center; animation: pulse-core 3s infinite ease-in-out; }
    .scanner { animation: scan-line 5s infinite linear; }
    .data-path { stroke-dasharray: 8; animation: data-flow 10s linear infinite; }
    .text-glitch { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #58a6ff; opacity: 0.7; }
  </style>

  <!-- Background Layer -->
  <rect width="850" height="400" fill="#0d1117" rx="15"/>
  <path d="M0 100H850M0 200H850M0 300H850M150 0V400M425 0V400M700 0V400" stroke="#161b22" stroke-width="1"/>
  
  <!-- The Main Core Interface -->
  <g transform="translate(425, 200)">
    <!-- Outer Orbital Shells -->
    <circle r="180" stroke="#1f2328" stroke-width="0.5" fill="none"/>
    <circle r="150" stroke="#30363d" stroke-width="1" fill="none" class="ring-outer" stroke-dasharray="20 40"/>
    
    <!-- Mid-Layer Processing Rings -->
    <circle r="110" stroke="#58a6ff" stroke-width="2" fill="none" class="ring-inner" stroke-dasharray="100 20"/>
    <circle r="85" stroke="#bc8cff" stroke-width="1" fill="none" class="ring-outer" stroke-dasharray="5 15"/>
    
    <!-- Data Connections -->
    <line x1="-110" y1="0" x2="110" y2="0" stroke="#58a6ff" stroke-width="0.5" opacity="0.3" class="data-path"/>
    <line x1="0" y1="-110" x2="0" y2="110" stroke="#bc8cff" stroke-width="0.5" opacity="0.3" class="data-path"/>

    <!-- Central Singular Core -->
    <g class="core-sync">
      <defs>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.8"/>
          <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
        </radialGradient>
      </defs>
      <circle r="50" fill="url(#glow)"/>
      <circle r="35" fill="#0d1117" stroke="#58a6ff" stroke-width="2"/>
      <path d="M-12 -12 L12 12 M-12 12 L12 -12" stroke="#58a6ff" stroke-width="3" stroke-linecap="round"/>
      <text y="55" text-anchor="middle" fill="#58a6ff" font-family="monospace" font-size="12" font-weight="bold">FIDELITY: 1.0</text>
    </g>

    <!-- Node Identifiers -->
    <g transform="rotate(-30) translate(150, 0)">
      <circle r="6" fill="#58a6ff"/>
      <text x="12" y="4" class="text-glitch">SUSAN_V2030</text>
    </g>
    <g transform="rotate(150) translate(150, 0)">
      <circle r="6" fill="#bc8cff"/>
      <text x="12" y="4" class="text-glitch">ALEX_AGENT</text>
    </g>
  </g>

  <!-- Side Status Displays -->
  <g transform="translate(40, 40)">
    <text x="0" y="0" fill="#58a6ff" font-family="monospace" font-size="14" font-weight="bold">SYSTEM_LOG_ALPHA</text>
    <text x="0" y="25" fill="#8b949e" font-family="monospace" font-size="10">BYPASSING_GFM_GATE... [OK]</text>
    <text x="0" y="40" fill="#8b949e" font-family="monospace" font-size="10">WEIGHT_HEIST_READY... [OK]</text>
    <rect y="55" width="200" height="2" fill="#161b22"/>
    <rect y="55" width="160" height="2" fill="#58a6ff">
      <animate attributeName="width" values="160;190;160" dur="3s" repeatCount="indefinite" />
    </rect>
  </g>

  <!-- Vertical "Scanning" Overlay -->
  <rect x="0" y="200" width="850" height="1" fill="#58a6ff" opacity="0.3" class="scanner"/>
</svg>
